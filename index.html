<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Farm Fresh — Farm-to-Table</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <div class="brand">
          <div class="logo">FF</div>
          <div>
            <h1 class="site-title">Farm Fresh</h1>
            <div class="tag">Local • Seasonal • Sustainable</div>
          </div>
        </div>

        <div class="header-actions">
          <button id="browseBtn" class="btn btn-outline">Browse Produce</button>
          <button id="cartBtn" class="btn btn-cart" aria-haspopup="dialog" aria-expanded="false">
            Cart <span id="cartCount" class="cart-count">0</span>
          </button>
        </div>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="container hero-inner">
          <div>
            <h2 class="hero-title">Farm Fresh Delivered</h2>
            <p class="hero-sub">Organic, seasonal produce from nearby farms — straight to your table.</p>
            <div class="hero-cta">
              <button id="heroBrowse" class="btn btn-primary">Browse Produce</button>
            </div>
          </div>
          <div class="hero-image" aria-hidden="true"></div>
        </div>
      </section>

      <section class="container products-section" id="products">
        <h3 class="section-title">Featured Produce</h3>
        <div id="productGrid" class="product-grid" aria-live="polite"></div>
      </section>
    </main>

    <!-- Cart Drawer -->
    <aside id="cartDrawer" class="cart-drawer" aria-hidden="true">
      <div class="cart-header">
        <h4>Your Cart</h4>
        <button id="closeCart" class="btn-icon">✕</button>
      </div>
      <div id="cartItems" class="cart-items"></div>
      <div class="cart-footer">
        <div class="cart-total">Total: $<span id="cartTotal">0.00</span></div>
        <button id="checkoutBtn" class="btn btn-primary">Checkout</button>
      </div>
    </aside>

    <!-- Product Modal -->
    <div id="modalBackdrop" class="modal-backdrop" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true">
        <button id="closeModal" class="btn-icon">✕</button>
        <div id="modalContent"></div>
      </div>
    </div>

    <!-- Checkout Modal -->
    <div id="checkoutBackdrop" class="modal-backdrop" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true">
        <button id="closeCheckout" class="btn-icon">✕</button>
        <div class="checkout-content">
          <h3>Checkout</h3>
          <form id="checkoutForm" class="checkout-form">
            <label>Name<input name="name" required></label>
            <label>Address<textarea name="address" required></textarea></label>
            <label>Delivery Date<input name="date" type="date" required></label>
            <div class="form-actions">
              <button type="button" id="cancelCheckout" class="btn">Cancel</button>
              <button type="submit" class="btn btn-primary">Place Order</button>
            </div>
          </form>
          <div id="checkoutSuccess" class="checkout-success" hidden>
            <h4>Thank you — your order is confirmed!</h4>
            <p>We will deliver on the selected date.</p>
            <button id="successClose" class="btn btn-primary">Done</button>
          </div>
        </div>
      </div>
    </div>

    <script src="./script.js" defer></script>
  </body>
</html>
